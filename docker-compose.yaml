services:
  redis:
    image: redis:7-alpine
    container_name: aprove-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: aprove-mailhog
    ports:
      - '1025:1025'  # SMTP
      - '8025:8025'  # Web UI
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8025']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aprove-api
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: file:./prod.db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 1m
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_FROM: noreply@aprovame.com
      OPS_EMAIL: ${OPS_EMAIL:-ops@aprovame.com}
      PORT: 3000
    depends_on:
      redis:
        condition: service_healthy
      mailhog:
        condition: service_healthy
    volumes:
      - api-db:/app/prisma
    develop:
      watch:
        # Imagens rodam build compilado; alterações exigem rebuild da imagem
        - action: rebuild
          path: ./backend/src
        - action: rebuild
          path: ./backend/prisma
        - action: rebuild
          path: ./backend/package.json
        - action: rebuild
          path: ./backend/package-lock.json
        - action: rebuild
          path: ./backend/prisma.config.ts
        - action: rebuild
          path: ./backend/Dockerfile
        - action: rebuild
          path: ./backend/tsconfig.json
        - action: rebuild
          path: ./backend/tsconfig.build.json
        - action: rebuild
          path: ./backend/nest-cli.json

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aprove-frontend
    # Host 8080 → evita conflito com serviços que já usam a porta 80 (IIS, Apache, etc.)
    ports:
      - '8080:80'
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3000
    develop:
      watch:
        - action: rebuild
          path: ./frontend/src
        - action: rebuild
          path: ./frontend/public
        - action: rebuild
          path: ./frontend/index.html
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json
        - action: rebuild
          path: ./frontend/vite.config.ts
        - action: rebuild
          path: ./frontend/tsconfig.json
        - action: rebuild
          path: ./frontend/tsconfig.app.json
        - action: rebuild
          path: ./frontend/tsconfig.node.json
        - action: rebuild
          path: ./frontend/Dockerfile

volumes:
  redis-data:
  api-db:
